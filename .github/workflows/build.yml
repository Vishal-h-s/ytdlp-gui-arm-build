name: Build Custom Pacman Repo

on:
  schedule:
    - cron: '0 0 1 * *' 
  workflow_dispatch: 

# We need these permissions so the script is allowed to publish to a webpage
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Arch Package and Repo Database
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace archlinux:latest sh -c "
            # 1. Update system and install packaging tools
            pacman -Syu --noconfirm base-devel git sudo &&
            
            # 2. Create a non-root user (makepkg will fail if run as root)
            useradd -m builder &&
            echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers &&
            chown -R builder:builder /workspace &&
            
            # 3. Switch to the new user, download the AUR recipe, and compile
            su - builder -c '
              cd /workspace &&
              git clone https://aur.archlinux.org/ytdlp-gui.git aur-build &&
              cd aur-build &&
              makepkg -s --noconfirm &&
              
              # 4. Create a public web folder and move the finished package there
              mkdir -p /workspace/public &&
              cp *.pkg.tar.zst /workspace/public/ &&
              cd /workspace/public &&
              
              # 5. Generate the pacman repository database
              repo-add myrepo.db.tar.gz *.pkg.tar.zst &&
              
              # 6. GitHub Pages hates symlinks, so we hard-copy the database files
              rm myrepo.db myrepo.files &&
              cp myrepo.db.tar.gz myrepo.db &&
              cp myrepo.files.tar.gz myrepo.files
            '
          "

      # 7. Package up the public folder
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  # 8. Publish the folder to your live GitHub Pages URL
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4